<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente Ferroviario CNRT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-800 border-b border-gray-700 px-4 py-5 text-center shadow-md">
    <h1 class="text-2xl font-bold text-white tracking-tight">Agente Ferroviario CNRT</h1>
    <p class="text-gray-400 text-sm mt-1">
      Consultá datos de pasajeros, puntualidad y recaudación de la red ferroviaria argentina.
    </p>
  </header>

  <!-- Main content -->
  <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-6 flex flex-col gap-5">

    <!-- Input area -->
    <div class="flex gap-2">
      <input
        id="input-pregunta"
        type="text"
        placeholder="Ej: ¿Cuántos pasajeros transportó el Mitre en 2023?"
        maxlength="500"
        class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
      />
      <button
        id="btn-consultar"
        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition"
      >
        <span id="btn-text">Consultar</span>
        <span id="btn-spinner" class="spinner hidden" aria-hidden="true"></span>
      </button>
    </div>

    <!-- Example chips -->
    <div id="chips-ejemplos" class="flex flex-wrap gap-2">
      <!-- Populated by JS -->
    </div>

    <!-- Toast notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 bg-red-700 text-white text-sm px-4 py-3 rounded-lg shadow-lg max-w-xs" aria-live="assertive"></div>

    <!-- Response area -->
    <div id="response-area" class="hidden flex flex-col gap-4" aria-live="polite">

      <!-- Offline banner -->
      <div id="offline-banner" class="hidden bg-yellow-900 border border-yellow-600 text-yellow-200 text-sm px-4 py-3 rounded-lg">
        &#9888; Respuesta generada en modo offline (sin LLM). Los datos son correctos pero el texto puede ser menos natural.
      </div>

      <!-- Advertencias banners -->
      <div id="advertencias-area" class="flex flex-col gap-2"></div>

      <!-- Response card -->
      <div id="response-card" class="bg-gray-800 border border-gray-700 rounded-xl p-5 shadow">
        <!-- Populated by JS -->
      </div>

      <!-- Collapsible technical detail -->
      <details id="detalle-tecnico" class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
        <summary class="px-5 py-3 cursor-pointer text-sm text-gray-400 hover:text-gray-200 select-none transition">
          Ver detalle t&eacute;cnico
        </summary>
        <div id="detalle-content" class="px-5 pb-4 pt-1 text-xs text-gray-400 space-y-1 border-t border-gray-700">
          <!-- Populated by JS -->
        </div>
      </details>

    </div>

    <!-- Session history -->
    <div id="historial-area" class="hidden">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Consultas recientes</h2>
      <div id="historial-chips" class="flex flex-wrap gap-2"></div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 border-t border-gray-700 px-4 py-4 text-center text-xs text-gray-500">
    <p id="footer-cobertura">Cargando cobertura...</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
